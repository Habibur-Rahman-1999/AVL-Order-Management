<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Order Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- 1. LOGIN VIEW -->
        <div id="login-view" class="view active">
            <h2>লগইন</h2>
            <div class="input-group">
                <label>ইউজার আইডি / ইমেইল</label>
                <input type="email" id="loginEmail" placeholder="example@akijfood.com">
            </div>
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড লিখুন">
                    <i class="fas fa-eye id-toggle" onclick="togglePassVisibility('loginPassword', this)"></i>
                </div>
            </div>
            <button id="btnLogin"><i class="fas fa-right-to-bracket"></i> লগইন</button>
            <button id="btnForgotPassword" class="btn-link"><i class="fas fa-key"></i> পাসওয়ার্ড ভুলে গেছেন?</button>
            <p>নতুন অ্যাকাউন্ট? <span id="goToRegister" class="link-text">রেজিস্ট্রেশন করুন</span></p>
        </div>

        <!-- 2. REGISTER VIEW -->
        <div id="register-view" class="view">
            <h2>রেজিস্ট্রেশন</h2>
            <div class="input-group"><label>এনরোলমেন্ট নম্বর</label><input type="text" id="regEnroll"></div>
            <div class="input-group"><label>নাম</label><input type="text" id="regName"></div>
            <div class="input-group"><label>ইমেইল</label><input type="email" id="regEmail"></div>
            <div class="input-group"><label>সিলস লাইন</label><input type="text" id="regSalesLine"></div>
            <div class="input-group"><label>ইউনিট</label><input type="text" id="regUnit"></div>
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="নূন্যতম ৬ অক্ষর">
                    <i class="fas fa-eye id-toggle" onclick="togglePassVisibility('regPassword', this)"></i>
                </div>
            </div>
            <button id="btnSendOTP"><i class="fas fa-paper-plane"></i> ওটিপি কোড পাঠান</button>
            <p>ইতিমধ্যে অ্যাকাউন্ট আছে? <span id="goToLogin" class="link-text">লগইন করুন</span></p>
        </div>

        <!-- 3. REGISTRATION OTP VIEW -->
        <div id="otp-view" class="view">
            <h2>ওটিপি যাচাইকরণ</h2>
            <p id="otp-message"></p>
            <div class="input-group"><input type="text" id="otpInput" placeholder="৬ ডিজিট কোড"></div>
            <button id="btnVerifyOTP"><i class="fas fa-circle-check"></i> কোড যাচাই ও অ্যাকাউন্ট তৈরি</button>
            <button id="backToRegister" class="btn-link">ফিরে যান</button>
        </div>

        <!-- 4. RESET OTP VIEW -->
        <div id="reset-otp-view" class="view">
            <h2>রিসেট ওটিপি যাচাই</h2>
            <p id="reset-otp-message"></p>
            <div class="input-group"><input type="text" id="resetOtpInput" placeholder="৬ ডিজিট রিসেট কোড"></div>
            <button id="btnVerifyResetOtp"><i class="fas fa-unlock-keyhole"></i> কোড যাচাই করুন</button>
            <button id="backToLoginFromReset" class="btn-link">লগইন পেজে ফিরুন</button>
        </div>

        <!-- 5. NEW PASSWORD VIEW -->
        <div id="new-password-view" class="view">
            <h2>নতুন পাসওয়ার্ড সেট করুন</h2>
            <div class="input-group">
                <label>নতুন পাসওয়ার্ড</label>
                <div class="password-wrapper">
                    <input type="password" id="newPasswordInput" placeholder="নূন্যতম ৬ অক্ষর">
                    <i class="fas fa-eye id-toggle" onclick="togglePassVisibility('newPasswordInput', this)"></i>
                </div>
            </div>
            <div class="input-group">
                <label>পাসওয়ার্ড নিশ্চিত করুন</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPasswordInput" placeholder="আবার লিখুন">
                    <i class="fas fa-eye id-toggle" onclick="togglePassVisibility('confirmPasswordInput', this)"></i>
                </div>
            </div>
            <button id="btnSaveNewPassword"><i class="fas fa-floppy-disk"></i> পাসওয়ার্ড সংরক্ষণ করুন</button>
        </div>
    </div>

    <script>
        function togglePassVisibility(inputId, iconElement) {
            const passInput = document.getElementById(inputId);
            if (passInput.type === "password") {
                passInput.type = "text";
                iconElement.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                passInput.type = "password";
                iconElement.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
