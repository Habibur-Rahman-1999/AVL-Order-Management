<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Order Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        
        <div id="login-view" class="auth-view active">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>Login</h2>
                <p>AVL Order Management</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label>User ID / Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="example@akijfood.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="login-password" placeholder="Enter password." required>
                        <i class="fas fa-eye toggle-icon" onclick="togglePassword('login-password', this)"></i>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <a class="btn-link" onclick="switchView('forgot-view')">Forgot password?</a>
                    <a class="btn-link" onclick="switchView('register-view')">New account? <strong>Register</strong></a>
                </div>
            </form>
        </div>

        <div id="register-view" class="auth-view">
            <div class="login-header">
                <div class="logo-icon" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>রেজিস্ট্রেশন</h2>
                <p>নতুন অ্যাকাউন্ট তৈরি করুন</p>
            </div>
            
            <form id="register-form">
                <div class="input-group">
                    <label>এনরোলমেন্ট নম্বর</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" id="reg-enrollment" placeholder="আপনার এনরোলমেন্ট নম্বর লিখুন" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>নাম</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="reg-name" placeholder="আপনার পুরো নাম লিখুন" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>ইমেইল</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" placeholder="example@akijfood.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>সেলস লাইন</label>
                    <div class="input-wrapper">
                        <i class="fas fa-route input-icon"></i>
                        <select id="reg-sales-line" required>
                            <option value="" disabled selected>সেলস লাইন সিলেক্ট করুন</option>
                            <option value="Horeca">Horeca</option>
                            <option value="Modern Trade">Modern Trade</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>ইউনিট</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building input-icon"></i>
                        <select id="reg-unit" required>
                            <option value="" disabled selected>ইউনিট সিলেক্ট করুন</option>
                            <option value="AFBL">AFBL (Akij Food & Beverage Ltd)</option>
                            <option value="AVL">AVL (Akij Venture Ltd)</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>পাসওয়ার্ড</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="reg-password" placeholder="পাসওয়ার্ড লিখুন" required>
                        <i class="fas fa-eye toggle-icon" onclick="togglePassword('reg-password', this)"></i>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="submit" class="btn btn-secondary" id="register-btn">
                        <i class="fas fa-user-check"></i> রেজিস্ট্রেশন করুন
                    </button>
                    <a class="btn-link" onclick="switchView('login-view')">ইতিমধ্যে অ্যাকাউন্ট আছে? <strong>লগইন করুন</strong></a>
                </div>
            </form>
        </div>

        <div id="forgot-view" class="auth-view">
            <div class="login-header">
                <div class="logo-icon" style="background: linear-gradient(135deg, #ff9900, #ff5500);">
                    <i class="fas fa-key"></i>
                </div>
                <h2>পাসওয়ার্ড ভুলে গেছেন?</h2>
                <p>আপনার ইমেইল আইডিটি লিখুন</p>
            </div>
            
            <form id="forgot-form">
                <div class="input-group">
                    <label>ইউজার আইডি / ইমেইল</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="forgot-email" placeholder="example@akijfood.com" required>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary" id="forgot-btn">
                        <i class="fas fa-paper-plane"></i> রিসেট লিংক পাঠান
                    </button>
                    <a class="btn-link" onclick="switchView('login-view')">ফিরে যান <strong>লগইন পেজে</strong></a>
                </div>
            </form>
        </div>

        <div id="reset-view" class="auth-view">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h2>Set new password</h2>
                <p>Enter a new password for your account.</p>
            </div>
            
            <form id="reset-form">
                <div class="input-group">
                    <label>New password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="new-password" placeholder="welcome" required>
                        <i class="fas fa-eye toggle-icon" onclick="togglePassword('new-password', this)"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="welcome" required>
                        <i class="fas fa-eye toggle-icon" onclick="togglePassword('confirm-password', this)"></i>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary" id="reset-btn">
                        Update Password
                    </button>
                </div>
            </form>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
