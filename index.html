<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVL Order Management - System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        
        <div id="login-view" class="auth-view active">
            <div class="login-header">
                <div class="logo-icon"><i class="fas fa-boxes-stacked"></i></div>
                <h2>AVL Order Management</h2>
                <p>আমার অর্ডার সিস্টেম</p>
            </div>
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>ইউজার আইডি / ইমেইল</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="loginEmail" placeholder="username@akijfood.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>পাসওয়ার্ড</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="action-buttons">
                    <button type="button" id="btnLogin" class="btn btn-primary"><i class="fas fa-right-to-bracket"></i> লগইন</button>
                    <button type="button" id="btnForgotPassword" class="btn btn-link" style="color: #e53e3e; font-weight: 600;"><i class="fas fa-key"></i> পাসওয়ার্ড ভুলে গেছেন?</button>
                    <button type="button" id="goToRegister" class="btn btn-link">নতুন অ্যাকাউন্ট তৈরি করুন (রেজিস্টার)</button>
                </div>
            </form>
        </div>

        <div id="register-view" class="auth-view">
            <div class="login-header">
                <h2>নিবন্ধন ফর্ম</h2>
                <p>সঠিক তথ্য দিয়ে অ্যাকাউন্ট তৈরি করুন</p>
            </div>
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>Enroll ID (আইডি নম্বর)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card input-icon"></i>
                        <input type="text" id="regEnroll" placeholder="উদাঃ 12345" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>পূর্ণ নাম (Full Name)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-tag input-icon"></i>
                        <input type="text" id="regName" placeholder="আপনার নাম লিখুন" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>অফিশিয়াল ইমেইল</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="regEmail" placeholder="username@akijfood.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Sales Line (সেলস লাইন)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-route input-icon"></i>
                        <select id="regSalesLine" required>
                            <option value="" disabled selected>সেলস লাইন সিলেক্ট করুন</option>
                            <option value="Beverage">Beverage</option>
                            <option value="Food">Food</option>
                            <option value="Dairy">Dairy</option>
                            <option value="Commodity">Commodity</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Unit (ইউনিট)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-building input-icon"></i>
                        <select id="regUnit" required>
                            <option value="" disabled selected>ইউনিট সিলেক্ট করুন</option>
                            <option value="AVL">Akij Venture Ltd (AVL)</option>
                            <option value="AFBL">Akij Food & Beverage Ltd (AFBL)</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>পাসওয়ার্ড</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="regPassword" placeholder="নূন্যতম ৬ অক্ষরের পাসওয়ার্ড" required>
                    </div>
                </div>
                <div class="action-buttons">
                    <button type="button" id="btnSendOTP" class="btn btn-secondary"><i class="fas fa-paper-plane"></i> ওটিপি কোড পাঠান</button>
                    <button type="button" id="goToLogin" class="btn btn-link">ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন করুন</button>
                </div>
            </form>
        </div>

        <div id="otp-view" class="auth-view">
            <div class="login-header">
                <div class="logo-icon" style="background: #e53e3e;"><i class="fas fa-shield-halved"></i></div>
                <h2>ইমেইল ভেরিফিকেশন</h2>
                <p id="otp-message">আপনার ইমেইলে একটি ভেরিফিকেশন কোড পাঠানো হয়েছে</p>
            </div>
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>৬ ডিজিটের ওটিপি (OTP) কোড</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock-open input-icon"></i>
                        <input type="text" id="otpInput" placeholder="######" maxlength="6" required>
                    </div>
                </div>
                <div class="action-buttons">
                    <button type="button" id="btnVerifyOTP" class="btn btn-success"><i class="fas fa-circle-check"></i> কোড যাচাই ও অ্যাকাউন্ট তৈরি</button>
                    <button type="button" id="backToRegister" class="btn btn-link"><i class="fas fa-arrow-left"></i> তথ্য সংশোধন করুন</button>
                </div>
            </form>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
