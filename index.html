<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার অর্ডার সিস্টেম - AVL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-boxes-stacked"></i>
            </div>
            <h2>AVL Order Management</h2>
            <p>আমার অর্ডার সিস্টেম</p>
        </div>
        
        <form id="auth-form" onsubmit="return false;">
            <div class="input-group">
                <label for="userId">ইউজার আইডি / ইমেইল</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="userId" placeholder="আপনার আইডি বা ইমেইল দিন" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="password">পাসওয়ার্ড</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="action-buttons">
                <button type="button" id="btnLogin" class="btn btn-primary">
                    <i class="fas fa-right-to-bracket"></i> লগইন
                </button>
                <button type="button" id="btnRegister" class="btn btn-secondary">
                    <i class="fas fa-user-plus"></i> রেজিস্টার
                </button>
            </div>
            
            <div class="form-footer">
                <a href="#" id="forgotPassword" class="forgot-link">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>
        </form>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
